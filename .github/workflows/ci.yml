name: ci

# Slice 0 spine: provenance + privacy. Keyless by design — no Ollama, no API key.
# (The retrieval-eval gate against Qdrant + Postgres service containers is added in
# its own workflow once those stores exist.)
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for the denylist history scan
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"

      # Allowlist inversion: every committed data artifact must be regenerable from
      # corpus/ + the committed embedding cache, with no model and no key. A miss is
      # a hard error; any drift dirties the tree and fails the build.
      - name: Regenerate fixtures keyless
        run: python scripts/make_fixtures.py --keyless
      - name: Assert committed fixtures are byte-identical
        run: git diff --exit-code -- fixtures/ evals/ || (echo "::error::committed fixtures differ from a fresh keyless rebuild — run 'make fixtures' and commit" && exit 1)

      # Secondary tripwire: denylisted tokens / personal-data shapes over the tree
      # AND git history (the first place an adversary looks).
      - name: Denylist scan (tree + history)
        run: python scripts/denylist_scan.py --history

      - name: Provenance + unit tests
        run: python -m pytest -q

  eval-gate:
    # Keyless retrieval-eval gate: drives the real search() over the committed
    # index with cached query embeddings — no Ollama, no API key. A missing/empty
    # fixture is a hard error; metrics below baseline - tolerance fail the build.
    # (The Qdrant + Postgres service-container form lands with the cloud stores.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - name: Retrieval eval gate (keyless)
        id: eval
        run: python -m evals.run --keyless --gate
      - name: Comment metrics on the PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '## Retrieval eval';
            let body = marker + '\n\n';
            try { body += fs.readFileSync('evals/metrics.md', 'utf8'); }
            catch { body += '_metrics.md was not produced — the eval failed before writing metrics._'; }
            const ok = '${{ steps.eval.outcome }}' === 'success';
            body += `\n**Gate:** ${ok ? '✅ passed' : '❌ regression vs baseline'} · baseline \`evals/baseline.json\`.`;
            const { data: comments } = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number });
            const prev = comments.find((c) => c.body && c.body.startsWith(marker));
            if (prev) await github.rest.issues.updateComment({ ...context.repo, comment_id: prev.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run gitleaks directly over the FULL history + working tree, rather than the
      # action's push-range scan (which errors on the parentless root commit).
      - name: gitleaks (full history + tree)
        run: |
          VER=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git . --redact -v --exit-code 1
          /tmp/gitleaks dir . --redact -v --exit-code 1
